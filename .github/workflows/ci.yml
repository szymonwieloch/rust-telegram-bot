name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  # ═══════════════════════════════════════════════════════════════════════════
  # C build + tests (via CMake)
  # ═══════════════════════════════════════════════════════════════════════════
  c-build-test:
    name: "C: build & test (gcc)"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            cmake \
            gcc \
            libapr1-dev \
            libaprutil1-dev \
            libcurl4-openssl-dev \
            libjson-c-dev \
            libssl-dev \
            pkg-config

      - name: Install Rust toolchain (needed by Corrosion → Cargo)
        uses: dtolnay/rust-toolchain@stable

      - name: Configure CMake
        run: cmake -B build -DCMAKE_BUILD_TYPE=Debug

      - name: Build
        run: cmake --build build -j$(nproc)

      - name: Run C tests
        working-directory: build
        run: ctest --output-on-failure

  # ═══════════════════════════════════════════════════════════════════════════
  # C formatting check (clang-format)
  # ═══════════════════════════════════════════════════════════════════════════
  c-format:
    name: "C: format check (clang-format)"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install clang-format
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends clang-format

      - name: Check formatting
        run: |
          find . -type f \( -name '*.c' -o -name '*.h' \) \
            ! -path './build/*' \
            ! -path './_deps/*' \
            ! -path './corrosion/*' \
            ! -path './target/*' \
            ! -path './rust-lib/target/*' \
            ! -name 'abts.c' \
            ! -name 'abts.h' \
            -print0 | xargs -0 clang-format --dry-run --Werror

  # ═══════════════════════════════════════════════════════════════════════════
  # C static analysis (cppcheck)
  # ═══════════════════════════════════════════════════════════════════════════
  c-lint:
    name: "C: lint (cppcheck)"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install cppcheck
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            cppcheck \
            libapr1-dev \
            libaprutil1-dev

      - name: Run cppcheck
        run: |
          cppcheck --enable=warning,performance,portability,style --inconclusive --error-exitcode=1 \
            --suppress=missingIncludeSystem \
            --suppress=unmatchedSuppression \
            --suppress='*:test/abts.c' \
            -I include \
            -I src \
            $(pkg-config --cflags-only-I apr-1 apr-util-1) \
            src/ test/

  # ═══════════════════════════════════════════════════════════════════════════
  # Rust: format, lint, test
  # ═══════════════════════════════════════════════════════════════════════════
  rust-checks:
    name: "Rust: fmt + clippy + test"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: rust-lib
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain with components
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache Rust dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            rust-lib/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('rust-lib/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Check formatting
        run: cargo fmt --all --check

      - name: Run Clippy
        run: cargo clippy --all-targets -- -D warnings

      - name: Run Rust tests
        run: cargo test --all-targets
